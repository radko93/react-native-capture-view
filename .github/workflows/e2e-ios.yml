name: E2E iOS

on:
  push:
    branches:
      - main
    paths:
      - 'ios/**'
      - 'src/**'
      - 'example/**'
      - '*.podspec'
      - 'package.json'
      - '.github/workflows/e2e-ios.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'ios/**'
      - 'src/**'
      - 'example/**'
      - '*.podspec'
      - 'package.json'
      - '.github/workflows/e2e-ios.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-ios:
    runs-on: macos-26
    timeout-minutes: 20

    env:
      RCT_USE_RN_DEP: 1
      RCT_USE_PREBUILT_RNCORE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install cocoapods
        run: |
          cd example
          bundle install
          bundle exec pod install --project-directory=ios || \
            (rm -rf ios/Pods ios/Podfile.lock && bundle exec pod install --project-directory=ios)

      - name: Build iOS app (Release)
        run: |
          cd example/ios
          xcodebuild \
            -workspace CaptureViewExample.xcworkspace \
            -scheme CaptureViewExample \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Boot simulator and install app
        run: |
          xcrun simctl boot "iPhone 17 Pro" 2>/dev/null || true
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "CaptureViewExample.app" -path "*/Release-iphonesimulator/*" | head -1)
          xcrun simctl install booted "$APP_PATH"

      - name: Run Maestro E2E tests
        run: maestro test example/.maestro/

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maestro-ios-failures
          path: ~/.maestro/tests/
