name: E2E Android

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - 'src/**'
      - 'example/**'
      - 'package.json'
      - '.github/workflows/e2e-android.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'android/**'
      - 'src/**'
      - 'example/**'
      - 'package.json'
      - '.github/workflows/e2e-android.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install JDK
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Finalize Android SDK
        run: |
          /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"

      - name: Cache Gradle
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android APK (release)
        env:
          JAVA_OPTS: "-XX:MaxHeapSize=6g"
        run: |
          cd example/android
          ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=x86_64

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: false

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro E2E tests
        uses: reactivecircus/android-emulator-runner@62dbb605bba737720e10b196571df1c263a41f18 # v2.34.0
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            # Install the APK
            adb install example/android/app/build/outputs/apk/debug/app-debug.apk

            # Start Metro in background
            cd example && npx react-native start --port 8081 &
            until curl -s http://localhost:8081/status | grep -q "packager-status:running"; do
              sleep 2
            done
            cd ..

            # Launch app and wait
            adb shell am start -n captureview.example/.MainActivity
            sleep 5

            # Run Maestro
            maestro test example/.maestro/

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: maestro-android-failures
          path: ~/.maestro/tests/
