name: Harness iOS

on:
  push:
    branches:
      - main
    paths:
      - 'ios/**'
      - 'src/**'
      - 'example/**'
      - '*.podspec'
      - 'package.json'
      - '.github/workflows/harness-ios.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'ios/**'
      - 'src/**'
      - 'example/**'
      - '*.podspec'
      - 'package.json'
      - '.github/workflows/harness-ios.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness-ios:
    runs-on: macos-26
    timeout-minutes: 20

    env:
      RCT_USE_RN_DEP: 1
      RCT_USE_PREBUILT_RNCORE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install cocoapods
        run: |
          cd example
          bundle install
          bundle exec pod install --project-directory=ios || \
            (rm -rf ios/Pods ios/Podfile.lock && bundle exec pod install --project-directory=ios)

      - name: Build iOS app (Debug)
        run: |
          cd example/ios
          xcodebuild \
            -workspace CaptureViewExample.xcworkspace \
            -scheme CaptureViewExample \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: Run harness tests
        uses: callstackincubator/react-native-harness@b1dc9551ba9fb6c1ad6cb5b94196accf12063d9c # v1.1.0
        with:
          app: ios/build/Build/Products/Debug-iphonesimulator/CaptureViewExample.app
          runner: ios
          projectRoot: example
